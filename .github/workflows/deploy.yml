name: GCP Google Cloud Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  gcp-deploy-pipeline:
    runs-on: ubuntu-latest

    # Injecting the variables required by main.tf here 👇
    env:
      TF_VAR_network_name: "production-vpc-network"
      TF_VAR_subnet_cidr:  "10.0.1.0/24"
      TF_VAR_region:       "us-central1"

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud via Keyless WIF'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/1071259937608/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-sa@project-4d670ee4-c2ac-4050-8e8.iam.gserviceaccount.com'

    - name: 'Setup Terraform'
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "latest"

    - name: 'Terraform Init'
      run: terraform init

    # Runs on Pull Request: Will use the env variables above automatically
    - name: 'Terraform Plan'
      if: github.event_name == 'pull_request'
      run: terraform plan

    # Runs on Merge to Main: Will use the env variables above automatically
    - name: 'Terraform Apply'
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve